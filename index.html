<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oneroomchat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- 左: 広告枠(忍者AdMax) -->
  <aside class="ad-slot" aria-label="広告スペース">
    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/f8117ebd230b7bbc1188012f1301b2ab"></script>
    <!-- admax -->
  </aside>

  <main class="main">

    <!-- チャット表示エリア(部屋は今は1つだけ) -->
    <div class="chat-panel" id="chatPanel" aria-live="polite">
      <div class="chat-spacer"></div>
      <!-- ここにメッセージが追加される -->
    </div>

    <!-- 入力欄(中央寄せ) -->
    <div class="composer">
      <textarea id="input" placeholder="ここに入力" maxlength="120" rows="2"></textarea>
      <div class="composer-footer">
        <span class="char-count" id="charCount">0 / 100</span>
        <span class="cooldown-label" id="cooldownLabel"></span>
        <button class="send-btn" id="sendBtn" aria-label="送信">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 20l18-8L3 4v6l12 2-12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 接続状態・エラー表示 -->
    <div class="status" id="status">接続中…</div>

  </main>

  <!-- 右: 将来の拡張用スペース(左と対称) -->
  <div class="side-spacer" aria-hidden="true"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
