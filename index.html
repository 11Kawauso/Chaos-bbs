<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oneroomchat</title>
<link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta property="og:title" content="oneroomchat">
<meta property="og:description" content="わんるーむ匿名掲示板">
<meta property="og:image" content="https://11kawauso.github.io/Chaos-bbs/ogp.png">
<meta property="og:url" content="https://11kawauso.github.io/Chaos-bbs/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="description" content="わんるーむ匿名掲示板">
<link rel="stylesheet" href="style.css">
</head>
<body>



<!--
      ようこそ、ソースを読む人。
      この掲示板には部屋が一つしかないことになっています。
      なっています。
-->



<div class="layout">

  <!-- 左: 広告枠(忍者AdMax) -->
  <aside class="ad-slot" id="adSlot" aria-label="広告スペース">
    <script>
      if (window.matchMedia('(min-width: 821px)').matches) {
        document.write('<script src="https://adm.shinobi.jp/s/f8117ebd230b7bbc1188012f1301b2ab"><\/script>');
      }
    </script>
  <div class="ad-fallback" id="adFallback" aria-hidden="true"></div>
</aside>

  <main class="main">

    <!-- スマホ用広告(スマホ幅のときだけ読み込み・表示) -->
  <div class="ad-slot-mobile">
    <script>
      if (window.matchMedia('(max-width: 820px)').matches) {
        document.write('<script src="https://adm.shinobi.jp/s/1d1782a16d02543f2d5804db0d79f857"><\/script>');
      }
    </script>
  </div>

    <!-- チャット表示エリア(部屋は今は1つだけ) -->
    <div class="chat-panel" id="chatPanel" aria-live="polite">
      <div class="chat-spacer"></div>
      <!-- ここにメッセージが追加される -->
    </div>

    <!-- 入力欄(中央寄せ) -->
    <div class="composer">
      <textarea id="input" placeholder="ここに入力" maxlength="60" rows="2"></textarea>
      <div class="composer-footer">
        <span class="char-count" id="charCount">0 / 50</span>
        <span class="cooldown-label" id="cooldownLabel"></span>
        <button class="send-btn" id="sendBtn" aria-label="送信" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 20l18-8L3 4v6l12 2-12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 接続ステータス表示 -->
    <div class="status" id="status">接続中...</div>

    <footer class="site-footer">
      <a href="./about.html">oneroomchatとは</a><span class="dot">·</span><a href="./terms.html">利用規約</a><span class="dot">·</span><a href="./privacy.html">プライバシーポリシー</a>
    </footer>

  </main>

  <!-- 右: 心得(道場の掛け軸風・約束が破られるたびに増える) -->
  <aside class="precepts" aria-label="心得">
    <ol id="preceptsList" class="precepts-list"></ol>
  </aside>

</div>

<!-- Firebase込みの本体。module指定が必須 -->
<script type="module" src="script.js"></script>

</body>
</html>
