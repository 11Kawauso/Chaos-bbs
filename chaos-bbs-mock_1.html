<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ここだけ掲示板(仮) - モック v2</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --panel-border: #e3e3e3;
    --line: #e8e8e8;
    --input-bg: #ececec;
    --input-placeholder: #a8a8a8;
    --text: #4a4a4a;
    --text-sub: #8a8a8a;
    --accent: #7a9e63;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", "Meiryo", sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }

  .layout {
    display: flex;
    gap: 24px;
    width: 100%;
    max-width: 1200px;
    align-items: flex-start;
  }

  /* ---- 左の広告枠 ---- */
  .ad-slot {
    flex: 0 0 160px;
    height: 600px;
    border: 2px dashed #cfcfcf;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-sub);
    font-size: 13px;
    position: sticky;
    top: 24px;
  }
  .ad-slot .ad-label { font-size: 11px; letter-spacing: 2px; }
  /*
    ▼ 忍者AdMaxのタグをもらったら、この .ad-slot の中身を
      発行されたスクリプトタグに差し替える(160×600の枠を作成すること)
      ※デプロイ後、登録したURL上でしか広告は表示されません
  */

  /* ---- 右のスペース(左右対称・将来の拡張用) ---- */
  .side-spacer {
    flex: 0 0 160px;
    height: 600px;
  }

  /* ---- メイン ---- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 0;
  }

  /* チャットパネル */
  .chat-panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    height: 62vh;
    min-height: 380px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .chat-spacer { flex: 1; }

  .msg {
    padding: 14px 20px;
    border-top: 1px solid var(--line);
    font-size: 15px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    animation: pop-in 0.15s ease-out;
  }
  .msg:first-of-type { border-top: none; }
  .msg.mine { background: #f4f9f0; }

  @keyframes pop-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .msg { animation: none; }
  }

  /* 入力欄: x軸中央寄せ */
  .composer {
    background: var(--input-bg);
    border-radius: 16px;
    padding: 14px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
  }
  .composer textarea {
    background: transparent;
    border: none;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    color: #333;
    height: 56px;
    outline: none;
  }
  .composer textarea::placeholder { color: var(--input-placeholder); }

  .composer-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
  }
  .char-count { font-size: 12px; color: #888; }
  .char-count.over { color: #c0392b; font-weight: bold; }

  .send-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    color: #8a8a8a;
    transition: color 0.15s;
  }
  .send-btn:hover:not(:disabled) { color: var(--accent); }
  .send-btn:disabled { cursor: not-allowed; opacity: 0.5; }
  .send-btn svg { width: 26px; height: 26px; }
  .cooldown-label { font-size: 12px; color: #666; min-width: 3em; text-align: right; }

  /* デモ用コントロール */
  .demo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 13px;
    color: #6b6b6b;
    padding: 0 4px;
  }
  .demo-bar button {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    background: #fafafa;
    color: var(--text);
  }
  .demo-bar button.on { background: #5b7a49; border-color: #5b7a49; color: #fff; }

  /* スマホ対応: 両サイド非表示 */
  @media (max-width: 820px) {
    .ad-slot, .side-spacer { display: none; }
    .chat-panel { height: 58vh; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- 左: 広告枠(忍者AdMaxタグをここに入れる予定) -->
  <aside class="ad-slot" aria-label="広告スペース">
    <span class="ad-label">A D</span>
    <span>広告スペース</span>
    <span style="font-size:11px">160×600</span>
  </aside>

  <main class="main">

    <!-- チャット表示エリア(部屋は今は1つだけ) -->
    <div class="chat-panel" id="chatPanel" aria-live="polite">
      <div class="chat-spacer"></div>
      <!-- ここにメッセージが追加される -->
    </div>

    <!-- 入力欄(中央寄せ) -->
    <div class="composer">
      <textarea id="input" placeholder="ここに入力" maxlength="120" rows="2"></textarea>
      <div class="composer-footer">
        <span class="char-count" id="charCount">0 / 100</span>
        <span class="cooldown-label" id="cooldownLabel"></span>
        <button class="send-btn" id="sendBtn" aria-label="送信">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 20l18-8L3 4v6l12 2-12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- デモ用: 混雑シミュレーション(本番では削除) -->
    <div class="demo-bar">
      <span>【モック用】混雑シミュレーション:</span>
      <button id="demoSlow">ゆっくり</button>
      <button id="demoFast">爆速</button>
      <button id="demoOff" class="on">停止</button>
    </div>

  </main>

  <!-- 右: 将来の拡張用スペース(左と対称) -->
  <div class="side-spacer" aria-hidden="true"></div>

</div>

<script>
(() => {
  const MAX_CHARS = 100;
  const COOLDOWN_SEC = 5;          // ← 5秒に変更(10秒にするならここを10に)
  const MAX_MESSAGES_SHOWN = 60;   // これより古い表示は消える(=流れていく)

  // 部屋は今は1つだけ。増やすときは { 1: [], 2: [], ... } に戻すだけ
  const rooms = { 1: [] };
  let currentRoom = 1;
  let cooldownTimer = null;
  let cooldownRemain = 0;

  const panel = document.getElementById('chatPanel');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const charCount = document.getElementById('charCount');
  const cooldownLabel = document.getElementById('cooldownLabel');

  // ---- 表示 ----
  function isNearBottom() {
    return panel.scrollHeight - panel.scrollTop - panel.clientHeight < 80;
  }

  function makeMsgEl(m) {
    const div = document.createElement('div');
    div.className = 'msg' + (m.mine ? ' mine' : '');
    div.textContent = m.text;
    return div;
  }

  function addMessage(roomId, text, mine = false) {
    const m = { text, mine };
    rooms[roomId].push(m);
    if (rooms[roomId].length > MAX_MESSAGES_SHOWN) rooms[roomId].shift();

    if (roomId === currentRoom) {
      const stick = isNearBottom() || mine;
      panel.appendChild(makeMsgEl(m));
      const msgs = panel.querySelectorAll('.msg');
      if (msgs.length > MAX_MESSAGES_SHOWN) msgs[0].remove();
      if (stick) panel.scrollTop = panel.scrollHeight;
    }
  }

  // ---- 文字数カウント ----
  function updateCharCount() {
    const len = [...input.value].length; // サロゲートペア対応
    charCount.textContent = `${len} / ${MAX_CHARS}`;
    charCount.classList.toggle('over', len > MAX_CHARS);
    updateSendState();
  }
  input.addEventListener('input', updateCharCount);

  // ---- 送信 ----
  function updateSendState() {
    const len = [...input.value].length;
    const ok = len > 0 && len <= MAX_CHARS && cooldownRemain === 0;
    sendBtn.disabled = !ok;
  }

  function startCooldown() {
    cooldownRemain = COOLDOWN_SEC;
    cooldownLabel.textContent = `あと${cooldownRemain}秒`;
    updateSendState();
    cooldownTimer = setInterval(() => {
      cooldownRemain--;
      if (cooldownRemain <= 0) {
        clearInterval(cooldownTimer);
        cooldownRemain = 0;
        cooldownLabel.textContent = '';
      } else {
        cooldownLabel.textContent = `あと${cooldownRemain}秒`;
      }
      updateSendState();
    }, 1000);
  }

  function send() {
    const text = input.value.trim();
    const len = [...text].length;
    if (!text || len > MAX_CHARS || cooldownRemain > 0) return;
    addMessage(currentRoom, text, true);
    input.value = '';
    updateCharCount();
    startCooldown();
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      send();
    }
  });

  // ---- 混雑シミュレーション ----
  const samplePool = [
    'おはよー', 'おは', '朝からはやいわお前ら', 'ニートか???', 'お前もやろ!',
    'おはようございます', 'ここ何する場所?', '何もしない場所', '流れ早すぎw',
    '自分の書き込みどこ行った', 'もう流れたぞ', '草', 'それな', 'は?',
    '仲良くしようや', '今北', '10000人おって', 'んなわけ',
    'ひまー', 'テスト', 'てすと', 'あ', 'w', 'wwww', 'なんの話しとった?',
    '知らん', '広告踏んでけ', '誰?', '匿名やぞ', 'せやった'
  ];
  let demoTimer = null;

  function setDemo(mode) {
    if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
    ['demoSlow','demoFast','demoOff'].forEach(id => document.getElementById(id).classList.remove('on'));
    if (mode === 'off') {
      document.getElementById('demoOff').classList.add('on');
      return;
    }
    const interval = mode === 'fast' ? 180 : 2500;
    document.getElementById(mode === 'fast' ? 'demoFast' : 'demoSlow').classList.add('on');
    demoTimer = setInterval(() => {
      const text = samplePool[Math.floor(Math.random() * samplePool.length)];
      addMessage(currentRoom, text, false);
    }, interval);
  }

  document.getElementById('demoSlow').addEventListener('click', () => setDemo('slow'));
  document.getElementById('demoFast').addEventListener('click', () => setDemo('fast'));
  document.getElementById('demoOff').addEventListener('click', () => setDemo('off'));

  // ---- 初期メッセージ ----
  ['おはよー', 'おは', '朝からはやいわお前ら\nニートか???', 'お前もやろ!', 'おはようございます']
    .forEach(t => addMessage(1, t));

  updateCharCount();
})();
</script>

</body>
</html>
