<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部屋2(建設中) | oneroomchat</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --panel-border: #e3e3e3;
    --line: #e8e8e8;
    --input-bg: #ececec;
    --input-placeholder: #a8a8a8;
    --text: #4a4a4a;
    --text-sub: #8a8a8a;
    --accent: #7a9e63;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    color: var(--text);
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", "Meiryo", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .main {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .room-label {
    text-align: center;
    font-size: 13px;
    color: var(--text-sub);
    letter-spacing: 2px;
  }
  .chat-panel {
    background: #ffffff;
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    height: 62vh;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    color: #b5b5b5;
    font-size: 14px;
    line-height: 2.2;
    text-align: center;
    padding: 20px;
  }
  .composer {
    background: var(--input-bg);
    border-radius: 16px;
    padding: 14px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    opacity: 0.6;
  }
  .composer textarea {
    background: transparent;
    border: none;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    height: 56px;
    outline: none;
  }
  .composer textarea::placeholder { color: var(--input-placeholder); }
  .composer-footer {
    display: flex;
    justify-content: flex-end;
  }
  .send-btn {
    border: none;
    background: transparent;
    padding: 4px;
    display: flex;
    color: #bbb;
    cursor: not-allowed;
  }
  .send-btn svg { width: 26px; height: 26px; }
  .back {
    text-align: center;
    font-size: 12px;
  }
  .back a {
    color: #b5b5b5;
    text-decoration: none;
  }
  .back a:hover { text-decoration: underline; color: var(--accent); }
</style>
</head>
<body>

<main class="main">

  <div class="room-label">部屋2</div>

  <div class="chat-panel">
    <p>
      建設中です。<br><br>
      まだ壁もありません。<br>
      床はあります。あなたが今立っているので。<br><br>
      ここに人が集まる日は、来るのでしょうか。
    </p>
  </div>

  <div class="composer">
    <textarea placeholder="工事中につき投稿できません" disabled></textarea>
    <div class="composer-footer">
      <button class="send-btn" disabled aria-label="送信(無効)">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3 20l18-8L3 4v6l12 2-12 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="back"><a href="./index.html">← 部屋1に戻る</a></div>

</main>

</body>
</html>
